# Home Assistant add-on manifest for AP Monitor.
name: AP Monitor
version: "1.19.3"
slug: ap_monitor
description: Live wifi client → access-point monitoring for OpenWrt / GL.iNet
url: https://github.com/beneeb304/ap-monitor
arch:
  - aarch64
  - armv7
  - armhf
  - amd64
init: false
startup: application
boot: auto
# Web dashboard reachable directly at http://<home-assistant-ip>:8088, and via
# HA's Ingress proxy (Settings > Add-ons > AP Monitor > Open Web UI). Ingress
# tunnels through HA's own connection instead of resolving a separate
# hostname, which fixes access from the HA mobile app on networks where the
# add-on's direct host (often a .local mDNS name) doesn't resolve reliably —
# notably iOS, where mDNS resolution in the app's embedded browser is flaky.
ports:
  8088/tcp: 8088
ports_description:
  8088/tcp: AP Monitor web dashboard
webui: "http://[HOST]:[PORT:8088]"
ingress: true
ingress_port: 8088
# Supervisor health check: an HTTP GET (not tcp://) so it detects the app
# *answering*, not just the port being open -- during the intermittent hang the
# TCP listener still accepts but no HTTP response comes back. If the user
# enables the Watchdog toggle on the add-on page, Supervisor restarts the
# add-on when this check fails, so a wedge self-heals instead of staying down.
# Must point at /health (unauthenticated liveness probe): pointing it at "/"
# with Basic Auth enabled returns 401, which Supervisor reads as UNHEALTHY --
# found in production restarting the add-on every ~5 minutes, silently.
watchdog: "http://[HOST]:[PORT:8088]/health"
# /share holds your config.yaml + SSH key; /data persists the history DB.
map:
  - share:rw
