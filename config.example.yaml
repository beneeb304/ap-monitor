# Copy this file to config.yaml and edit for your network:
#   cp config.example.yaml config.yaml
#
# config.yaml is git-ignored because it describes your private network.

poll_interval: 5          # seconds between polls
ssh_user: root
ssh_port: 22
ssh_timeout: 6

# Path to the SSH private key used to log into every device (key auth only).
#   Bare metal / Pi:  ~/.ssh/ap_monitor
#   Docker:           /app/ssh_key   (mount your key there — see README)
#   HA add-on:        /share/ap-monitor/ssh_key   (see addon/DOCS.md)
ssh_key: ~/.ssh/ap_monitor

listen_host: 0.0.0.0
listen_port: 8088

# Dashboard temperature unit: C (default) or F. Storage and MQTT always use
# °C; Home Assistant converts to its own configured unit system regardless.
# temp_unit: F

# SSH host keys are pinned on first connect and changes are rejected (detects
# AP impersonation). Pins are stored in a `known_hosts` file next to db_file;
# override the location here if needed. After reflashing an AP, delete its
# line from that file to re-pin.
# known_hosts_file: /data/known_hosts

# History database (SQLite).
#   Bare metal / Pi:  history.db        (relative to the app directory)
#   Docker:           /data/history.db  (mount a volume at /data to persist)
#   HA add-on:        /data/history.db  (persisted across add-on updates)
db_file: history.db
retention_days: 7         # how long to keep history + roam events
sample_interval: 30       # seconds between per-client signal samples (drill-down)

# Consecutive failed polls before an AP is declared offline (debounce).
# With poll_interval: 5 the default 3 means ~15 s before an outage alert.
offline_threshold: 3

# Optional: publish AP status to an MQTT broker with Home Assistant discovery.
# Each AP shows up in HA as a connectivity binary_sensor + client-count sensor,
# so a phone notification when an AP drops is a one-line HA automation.
# Uncomment and point at your broker. With the HA Mosquitto add-on, `host` is
# your Home Assistant IP:
# mqtt:
#   host: 192.168.1.50      # broker IP (Home Assistant if using Mosquitto add-on)
#   port: 1883
#   username: mqtt_user
#   password: mqtt_pass
#   # base_topic: ap_monitor
#   # discovery_prefix: homeassistant

# The device that runs the DHCP server, used to resolve MAC -> hostname/IP
# from its /tmp/dhcp.leases. Usually your main router.
dhcp_source: 192.168.1.1

# Every AP/router to monitor. `name` is the label shown in the UI — using each
# device's hostname is recommended. `host` is its LAN IP.
devices:
  - name: Router
    host: 192.168.1.1
  - name: AP-Living-Room
    host: 192.168.1.2
  - name: AP-Office
    host: 192.168.1.3
